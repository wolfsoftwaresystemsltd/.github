name: Discord Sponsor Notifications

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Sponsor event type'
        required: true
        default: 'created'
        type: choice
        options:
          - created
          - cancelled
          - tier_changed
      sponsor:
        description: 'Sponsor GitHub username'
        required: true
      tier:
        description: 'Tier name'
        required: false
        default: 'Sponsor'
      amount:
        description: 'Monthly amount ($)'
        required: false
        default: '5'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord of sponsor event
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_SPONSORS_WEBHOOK }}
        run: |
          ACTION="${{ inputs.action }}"
          SPONSOR="${{ inputs.sponsor }}"
          TIER="${{ inputs.tier }}"
          MONTHLY="${{ inputs.amount }}"
          SPONSOR_URL="https://github.com/$SPONSOR"

          if [ "$ACTION" = "created" ]; then
            TITLE="New Sponsor"
            EMOJI="🎉"
            COLOR=3066993
            DESC="**${SPONSOR}** is now sponsoring!\n\nTier: **${TIER}** (\$${MONTHLY}/month)\n\n👉 Assign the Sponsor role in Discord"
          elif [ "$ACTION" = "cancelled" ]; then
            TITLE="Sponsor Cancelled"
            EMOJI="😢"
            COLOR=15158332
            DESC="**${SPONSOR}** cancelled their sponsorship.\n\nPrevious tier: **${TIER}**\n\n⚠️ Remove their Sponsor role in Discord."
          elif [ "$ACTION" = "tier_changed" ]; then
            TITLE="Sponsor Tier Changed"
            EMOJI="🔄"
            COLOR=3447003
            DESC="**${SPONSOR}** changed their tier.\n\nNew tier: **${TIER}** (\$${MONTHLY}/month)"
          else
            TITLE="Sponsor Event"
            EMOJI="📢"
            COLOR=7506394
            DESC="**${SPONSOR}** — event: ${ACTION}\n\nTier: **${TIER}**"
          fi

          jq -n \
            --arg title "${EMOJI} ${TITLE}" \
            --arg desc "$DESC" \
            --arg url "$SPONSOR_URL" \
            --arg sponsor "$SPONSOR" \
            --arg footer "GitHub Sponsors • WolfStack" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: '$COLOR',
                author: { name: $sponsor, url: $url },
                footer: { text: $footer },
                timestamp: (now | todate)
              }]
            }' > payload.json

          curl -sf -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK_URL"
